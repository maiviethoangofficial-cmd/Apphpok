<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=0">
    <title>HPOK - ĐẶT LẠI MẬT KHẨU</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --pink: #ff2d55;
            --gold: linear-gradient(135deg, #ffe1a8 0%, #d4af37 50%, #b8860b 100%);
            --glass: rgba(255, 255, 255, 0.08);
        }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #050505; color: #fff; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 420px; min-height: 100vh; background: radial-gradient(circle at 50% 10%, #301018 0%, #050505 100%); padding: 25px; box-sizing: border-box; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .logo-mini { font-size: 28px; font-weight: 900; color: var(--pink); text-shadow: 0 0 15px var(--pink); margin-bottom: 10px; }
        
        .auth-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px; padding: 25px; box-shadow: 0 25px 50px rgba(0,0,0,0.7); }

        .step-indicator { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .step { width: 35px; height: 4px; background: #333; border-radius: 2px; }
        .step.active { background: var(--pink); box-shadow: 0 0 10px var(--pink); }

        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; font-size: 11px; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .input-wrap { background: rgba(0,0,0,0.5); border: 1px solid #444; border-radius: 12px; display: flex; align-items: center; padding: 0 15px; transition: 0.3s; }
        .input-wrap:focus-within { border-color: var(--pink); box-shadow: 0 0 15px rgba(255, 45, 85, 0.3); }
        .input-wrap i { color: var(--pink); font-size: 16px; width: 25px; }
        .input-wrap input { background: none; border: none; padding: 15px 5px; color: #fff; width: 100%; outline: none; font-size: 15px; }

        .btn-gold { width: 100%; padding: 16px; border-radius: 15px; border: none; background: var(--gold); color: #000; font-weight: 900; font-size: 16px; text-transform: uppercase; cursor: pointer; box-shadow: 0 10px 30px rgba(184, 134, 11, 0.5); transition: 0.2s; margin-top: 15px; }
        .btn-gold:active { transform: scale(0.96); }

        .success-msg { display: none; text-align: center; padding: 20px; }
        .success-msg i { font-size: 50px; color: #00ff88; margin-bottom: 15px; text-shadow: 0 0 20px rgba(0,255,136,0.5); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-mini">HPOK KHÔI PHỤC TÀI KHOẢN<div>
            <p style="color:#888; font-size: 13px;">Thiết lập mật khẩu mới bảo mật hơn</p>
        </div>

        <div class="auth-card" id="resetForm">
            <div class="step-indicator">
                <div class="step"></div>
                <div class="step active"></div>
            </div>

            <div class="input-group">
                <label>Mật khẩu mới</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-lock-open"></i>
                    <input type="password" id="newPass" placeholder="Nhập mật khẩu mới...">
                </div>
            </div>

            <div class="input-group">
                <label>Xác nhận mật khẩu</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-shield-check"></i>
                    <input type="password" id="confirmPass" placeholder="Nhập lại mật khẩu mới...">
                </div>
            </div>

            <button class="btn-gold" onclick="updatePassword()">CẬP NHẬT MẬT KHẨU</button>
        </div>

        <div class="auth-card success-msg" id="successBox">
            <i class="fa-solid fa-circle-check"></i>
            <h3 style="margin: 0; color: #fff;">THÀNH CÔNG!</h3>
            <p style="color: #aaa; font-size: 14px; margin: 10px 0 20px 0;">Mật khẩu của bạn đã được thay đổi. Hãy đăng nhập lại để trải nghiệm game.</p>
            <button class="btn-gold" onclick="window.location.href='login.html'">ĐĂNG NHẬP NGAY</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBD27MYenkjWOEjqj0hCisbh_61F_6bhSE",
            authDomain: "hpok-d355c.firebaseapp.com",
            databaseURL: "https://hpok-d355c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "hpok-d355c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.updatePassword = function() {
            const pass1 = document.getElementById('newPass').value;
            const pass2 = document.getElementById('confirmPass').value;
            const username = localStorage.getItem("tempRecoverUser"); // Lấy từ bước quên mật khẩu trước đó

            if(!pass1 || pass1.length < 6) return alert("Mật khẩu phải từ 6 ký tự!");
            if(pass1 !== pass2) return alert("Mật khẩu không khớp!");

            // Cập nhật lên Firebase
            update(ref(db, 'users/' + username), {
                password: pass1
            }).then(() => {
                document.getElementById('resetForm').style.display = 'none';
                document.getElementById('successBox').style.display = 'block';
            }).catch(err => {
                alert("Lỗi: " + err.message);
            });
        }
    </script>
</body>
</html>
