<style>
/* ===== CẤU HÌNH CHUNG ===== */
body {
    margin: 0;
    font-family: 'Segoe UI', Roboto, Arial, sans-serif;
    background: #0b0b0b;
    color: #fff;
    -webkit-tap-highlight-color: transparent;
    overflow-x: hidden;
}

/* ===== HEADER ===== */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 15px;
    background: #000;
    position: sticky;
    top: 0;
    z-index: 1000;
    border-bottom: 1px solid #222;
}

/* Link cho nút Menu ba gạch */
.menu-link { text-decoration: none; display: flex; align-items: center; }
.menu-btn { font-size: 20px; color: #ff2d55; cursor: pointer; }

.logo {
    font-size: 22px;
    font-weight: 900;
    background: linear-gradient(90deg, #ff2d55, #fff, #ff2d55);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 3s linear infinite;
}
@keyframes shine { 0%{background-position:-200%} 100%{background-position:200%} }

.btn-app {
    background: linear-gradient(145deg, #ff2d55, #ff6a88);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: bold;
    color: #fff;
    text-decoration: none;
    box-shadow: 0 0 10px rgba(255, 45, 85, 0.5);
}

/* ===== BANNER SLIDER ===== */
.slider-container { width: 100%; position: relative; overflow: hidden; border-bottom: 2px solid #333; background: #000; }
.slides { display: flex; transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); width: 100%; }
.slides img { width: 100%; flex-shrink: 0; height: 190px; object-fit: fill; display: block; }
.dots { text-align: center; position: absolute; bottom: 12px; width: 100%; z-index: 5; }
.dot { height: 5px; width: 5px; background: rgba(255, 255, 255, 0.5); margin: 0 4px; border-radius: 50%; display: inline-block; transition: all 0.3s ease; }
.dot.active { background: #ff2d55; width: 18px; border-radius: 10px; box-shadow: 0 0 8px #ff2d55; }

/* ===== TIN TỨC ===== */
.news { background: #1a1a1a; padding: 10px; display: flex; align-items: center; font-size: 12px; color: #ffca28; border-bottom: 1px solid #333; }
.news i { margin-right: 8px; font-size: 14px; }
.news-scroll { overflow: hidden; white-space: nowrap; flex: 1; }
.news-scroll span { display: inline-block; animation: run 15s linear infinite; }
@keyframes run { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

/* ===== THANH AUTH ===== */
.auth-bar { margin: 20px 10px; position: relative; height: 55px; display: flex; justify-content: center; align-items: center; gap: 15px; }
.auth-btn { flex: 1; height: 100%; border-radius: 30px; text-decoration: none; color: #fff; font-weight: 900; font-size: 16px; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; transition: all 0.3s ease; box-shadow: 0 5px 15px rgba(0,0,0,0.5); border: 2px solid transparent; }
.auth-register { background: linear-gradient(145deg, #ff1a1a, #800000); border-color: #ff4d4d; }
.auth-login { background: linear-gradient(145deg, #ffd700, #b8860b); color: #333; border-color: #fff; }
.auth-bonus { position: absolute; top: -15px; left: 15px; background: #ff9800; padding: 3px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; border: 1px solid #fff; z-index: 3; }

/* ===== MENU TAB HOT ===== */

/* Lắc đĩa (Cho XÓC ĐĨA) */
@keyframes shakePlate {
    0%, 100% { transform: scale(1); }
    20%, 60% { transform: translateX(-3px) rotate(-5deg); }
    40%, 80% { transform: translateX(3px) rotate(5deg); }
}

/* Nhảy xí ngầu (Cho TÀI XỈU) */
@keyframes bounceDice {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px) rotate(45deg); }
}

/* Rung vé số (Cho XỔ SỐ) */
@keyframes ticketGlow {
    0% { transform: scale(1); filter: brightness(1); }
    50% { transform: scale(1.1); filter: brightness(1.3); }
    100% { transform: scale(1); filter: brightness(1); }
}

/* --- Áp dụng khi Hover --- */

.menu-item a:hover .XocDia-animated {
    animation: shakePlate 0.4s infinite;
}

.menu-item a:hover .TaiXiu-animated {
    animation: bounceDice 0.5s ease infinite;
    color: #ffeb3b !important; /* Đổi sang màu vàng khi nhảy */
}

.menu-item a:hover .XoSo-animated {
    animation: ticketGlow 0.8s infinite;
}

/* --- Tối ưu cho Mobile (Khi có nhiều mục) --- */
.menu-tab {
    display: flex;
    overflow-x: auto; /* Cho phép vuốt ngang nếu màn hình quá hẹp */
    white-space: nowrap;
    gap: 15px;
    padding: 15px 10px;
    background: rgba(0, 0, 0, 0.6); /* Nền tối sang trọng cho app game */

    border-radius: 25px;

.menu-item span {
    font-size: 9px; /* Nhỏ lại một chút để hiển thị đủ chữ */
    margin-top: 8px;
}

.menu-item a {

    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px;
    border-radius: 15px;

/* Hiệu ứng khi di chuột (Hover) */
.menu-item a:hover {
    background: rgba(255, 255, 255, 0.25);
    transform: scale(1.1); /* Phóng to nhẹ */
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);

/* Hiệu ứng Icon sáng lên */
.menu-item i {

/* Hiệu ứng chữ */

    text-transform: uppercase;
    letter-spacing: 0.5px;

.games { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 10px; margin-bottom: 90px; }
.game { position: relative; border-radius: 12px; overflow: hidden; background: #1a1a1a; border: 1px solid #333; }
.game img { width: 100%; display: block; }

.hot-tag {

    font-weight: bold;

@keyframes pulseHot {

/* ===== TAB DƯỚI ===== */
.bottom { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 8px 0 12px 0; border-top: 1px solid #222; z-index: 1001; }

.bottom a.active { color: #ff2d55; }
