<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=0">
    <title>HPOK PRO | FULL LINKS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* 🛡️IT HOÀNG GITHUB | 🕒2026-03-30 | @STYLE: PINK-MASTER-LINKS */
        :root {
            --pink-main: #ff1493;
            --pink-neon: #ff007f;
            --pink-3d: linear-gradient(145deg, #ff69b4, #c71585);
            --gold: #ffd700;
            --bg: #000;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; background: var(--bg); color: #fff;
            font-family: 'Lexend', sans-serif; overflow-x: hidden;
        }

        /* HEADER GỌN GÀNG */
        .header-compact {
            height: 150px; background: radial-gradient(circle at center, #300, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-bottom: 2px solid var(--pink-main);
        }

        .logo-box {
            width: 70px; height: 70px; background: var(--pink-3d);
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            font-size: 30px; font-weight: 900; color: #fff;
            box-shadow: 0 0 20px var(--pink-neon); border: 2px solid var(--gold);
        }

        /* MARQUEE NEON */
        .marquee-container {
            background: rgba(255, 20, 147, 0.1); border-bottom: 1px solid #1a1a1a;
            height: 30px; display: flex; align-items: center; overflow: hidden;
        }

        .marquee-text {
            display: inline-block; padding-left: 100%; font-size: 10px; font-weight: 800;
            white-space: nowrap; animation: marquee-play 12s linear infinite; color: #fff;
        }
        @keyframes marquee-play { from { transform: translateX(0); } to { transform: translateX(-100%); } }

        /* MAIN LAYOUT */
        .main-container { padding: 15px 12px; }

        .user-status { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .status-card {
            background: #0d0d0d; padding: 12px; border-radius: 15px;
            text-align: center; border: 1px solid #222;
        }
        .status-card label { font-size: 9px; color: #555; font-weight: 900; display: block; margin-bottom: 3px; }
        .status-card b { color: #fff; font-size: 13px; text-shadow: 0 0 8px var(--pink-neon); }

        /* GRID 10 NÚT ĐÃ LIÊN KẾT */
        .grid-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .hpok-item {
            background: var(--pink-3d); border-radius: 18px; padding: 18px 5px;
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; color: #fff; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 5px 0 #800040, 0 8px 15px rgba(0,0,0,0.5); transition: 0.1s;
        }
        .hpok-item:active { transform: translateY(3px); box-shadow: 0 2px 0 #800040; }
        .hpok-item i { font-size: 24px; margin-bottom: 8px; }
        .hpok-item span { font-size: 11px; font-weight: 800; text-transform: uppercase; text-align: center; }

        .is-gold { background: linear-gradient(145deg, var(--gold), #ccac00); color: #000; box-shadow: 0 5px 0 #996600; }
        .is-gold i { color: #000; }
        .is-black { background: #151515; box-shadow: 0 5px 0 #000; }
        .is-black i { color: #ff3e3e; }
    </style>
</head>
<body>

    <div class="header-compact">
        <div class="logo-box">HP</div>
    </div>

    <div class="marquee-container">
        <div class="marquee-text">THÔNG BÁO: HỆ THỐNG HPOK OFFICIAL ĐÃ CẬP NHẬT PHIÊN BẢN MASTER 2026 • CHÚC BẠN GIAO DỊCH THÀNH CÔNG!</div>
    </div>

    <div class="main-container">
        <div class="user-status">
            <div class="status-card"><label>THÀNH VIÊN</label><b id="db-user">...</b></div>
            <div class="status-card"><label>SỐ DƯ VIP</label><b id="db-balance">0 VND</b></div>
        </div>

        <div class="grid-buttons">
            <a href="diemdanh.html" class="hpok-item"><i class="fas fa-calendar-check"></i><span>Điểm danh</span></a>
            <a href="hpok.mobileconfig" class="hpok-item is-gold"><i class="fas fa-download"></i><span>TẢI APP PRO</span></a>
            <a href="https://t.me/hpok_support" class="hpok-item"><i class="fas fa-headset"></i><span>CSKH 24/7</span></a>
            <a href="khieunai.html" class="hpok-item"><i class="fas fa-circle-exclamation"></i><span>Khiếu nại</span></a>
            <a href="vongquay.html" class="hpok-item"><i class="fas fa-star"></i><span>Vòng quay VIP</span></a>
            <a href="chamsoc_dl.html" class="hpok-item"><i class="fas fa-user-gear"></i><span>Chăm sóc ĐL</span></a>
            <a href="web_daily.html" class="hpok-item"><i class="fas fa-network-wired"></i><span>Web Đại lý</span></a>
            <a href="giftcode.html" class="hpok-item"><i class="fas fa-gift"></i><span>CODE HPOK</span></a>
            <a href="home.html" class="hpok-item"><i class="fas fa-rotate-left"></i><span>Quay lại</span></a>
            <a href="javascript:void(0)" onclick="logout()" class="hpok-item is-black"><i class="fas fa-power-off"></i><span>Đăng Xuất</span></a>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyBD27MYenkjWOEjqj0hCisbh_61F_6bhSE", 
        databaseURL: "https://hpok-d355c-default-rtdb.asia-southeast1.firebasedatabase.app", 
        projectId: "hpok-d355c" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const user = localStorage.getItem("username");

    if (user) {
        onValue(ref(db, 'users/' + user), (snap) => {
            const d = snap.val();
            if (d) {
                document.getElementById('db-user').innerText = d.fullName || user;
                document.getElementById('db-balance').innerText = new Intl.NumberFormat('vi-VN').format(d.balance || 0) + " VND";
            }
        });
    } else {
        window.location.href = "login.html";
    }

    window.logout = () => { if(confirm("Xác nhận đăng xuất?")) { localStorage.removeItem("username"); window.location.href = "login.html"; } };
</script>
</body>
</html>
