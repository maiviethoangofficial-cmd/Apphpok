<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=0">
    <title>HPOK - OFFICIAL</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --pink-main: #ff4d94; 
            --bg-dark: #000; 
            --glass-white: rgba(255, 255, 255, 0.95);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            margin: 0; font-family: 'Lexend', sans-serif; background: var(--bg-dark); 
            color: #fff; overflow-x: hidden; padding-bottom: 100px;
        }

        /* ----- POPUP THÔNG BÁO ----- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center; z-index: 5000;
        }
        .modal-box {
            width: 85%; max-width: 320px; background: var(--glass-white); border-radius: 30px;
            padding: 30px; text-align: center; color: #000;
            box-shadow: 0 20px 60px rgba(255, 77, 148, 0.4);
            animation: bounceIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes bounceIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-box i { font-size: 60px; color: var(--pink-main); margin-bottom: 15px; }
        .modal-btn {
            width: 100%; padding: 14px; background: var(--pink-main); color: #fff;
            border: none; border-radius: 18px; font-weight: 900; text-transform: uppercase; margin-top: 15px;
        }

        /* ----- HEADER ----- */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px; background: #000; border-bottom: 2px solid var(--pink-main);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 24px; font-weight: 900; color: var(--pink-main); text-decoration: none; }
        .logo span { color: #fff; }
        .menu-toggle { width: 42px; height: 42px; background: var(--pink-main); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #fff; text-decoration: none; }

        /* ----- BANNER SLIDE ----- */
        .banner-box { width: 100%; overflow: hidden; }
        .slides { display: flex; transition: transform 0.6s ease-in-out; width: 100%; }
        .slides img { width: 100%; flex-shrink: 0; aspect-ratio: 16/9; object-fit: cover; }

        /* ----- ACCOUNT SECTION ----- */
        .account-section { 
            margin: 15px; background: #fff; border-radius: 25px; padding: 20px; 
            color: #000; box-shadow: 0 10px 30px rgba(255,77,148,0.15);
            background-image: linear-gradient(135deg, #fff 50%, #fff0f5 100%);
        }
        .user-core { display: flex; justify-content: space-between; align-items: center; }
        .u-info-block { display: flex; align-items: center; gap: 12px; }
        .u-avatar { width: 50px; height: 50px; border-radius: 15px; background: var(--pink-main); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 22px; }
        .u-meta b { font-size: 17px; display: block; }
        .u-meta span { font-size: 11px; color: #888; font-weight: 700; background: #f0f0f0; padding: 2px 6px; border-radius: 5px; }
        #uBalance { font-size: 24px; font-weight: 900; color: var(--pink-main); }

        .quick-actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding-top: 15px; border-top: 1px solid #f0f0f0; margin-top: 15px; }
        .action-link { text-decoration: none; color: #000; font-size: 10px; text-align: center; font-weight: 900; }
        .action-link i { display: block; font-size: 22px; color: var(--pink-main); margin-bottom: 4px; }

        /* ----- FEATURE GRID ----- */
        .feature-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 5px 15px 20px; }
        .feat-item { text-decoration: none; text-align: center; }
        .feat-icon { width: 52px; height: 52px; border-radius: 18px; background: #111; border: 1px solid var(--pink-main); display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--pink-main); margin: 0 auto 6px; }
        .feat-item span { font-size: 9px; color: #fff; font-weight: 700; }

        /* ----- ANIMATIONS CHO MENU TAB ----- */
        @keyframes shakePlate { 0%, 100% { transform: scale(1); } 20%, 60% { transform: translateX(-3px) rotate(-5deg); } 40%, 80% { transform: translateX(3px) rotate(5deg); } }
        @keyframes bounceDice { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px) rotate(45deg); } }
        
        .menu-tab { display: flex; overflow-x: auto; white-space: nowrap; gap: 15px; padding: 15px 10px; background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); border-radius: 25px; margin: 0 10px; }
        .menu-tab::-webkit-scrollbar { display: none; }
        .menu-item a { text-decoration: none; display: flex; flex-direction: column; align-items: center; padding: 10px; transition: 0.3s; }
        .menu-item i { font-size: 26px; margin-bottom: 6px; }
        .menu-item span { font-size: 11px; font-weight: 700; color: #fff; }
        
        .menu-item a:hover .XocDia-animated { animation: shakePlate 0.4s infinite; }
        .menu-item a:hover .TaiXiu-animated { animation: bounceDice 0.5s infinite; }

        /* ----- GAME GRID ----- */
        .section-title { text-align: center; padding: 20px; font-size: 16px; font-weight: 900; text-transform: uppercase; color: #fff; }
        .section-title span { color: var(--pink-main); text-shadow: 0 0 10px var(--pink-main); }
        .game-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 15px 40px; }
        
        /* ----- FOOTER NAV ----- */
        .footer-nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: #fff; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid var(--pink-main); z-index: 1001; }
        .nav-item { text-decoration: none; color: #bbb; text-align: center; font-size: 10px; font-weight: 900; flex: 1; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 2px; }
        .nav-item.active { color: var(--pink-main); }

        /* ----- GAME OVERLAY ----- */
        .game-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 4000; display: none; }
        .game-header { position: absolute; top: 0; width: 100%; height: 55px; background: rgba(0,0,0,0.9); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; z-index: 4001; }
        .btn-exit { background: var(--pink-main); color: #fff; border: none; padding: 9px 16px; border-radius: 10px; font-weight: 900; }
    </style>
</head>
<body>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { initSlotEngine } from "./slot.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBD27MYenkjWOEjqj0hCisbh_61F_6bhSE",
        authDomain: "hpok-d355c.firebaseapp.com",
        databaseURL: "https://hpok-d355c-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "hpok-d355c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Chạy Engine nạp game từ file slot.js
    initSlotEngine(db, ref, onValue);

    // LOGIC PHỤ: Đồng hồ
    setInterval(() => { 
        document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('vi-VN'); 
    }, 1000);

    // LOGIC PHỤ: Banner Slideshow
    let curSlide = 0;
    const slideContainer = document.getElementById('slides');
    setInterval(() => {
        curSlide = (curSlide + 1) % 2; // Giả sử có 2 ảnh
        slideContainer.style.transform = `translateX(-${curSlide * 100}%)`;
    }, 5000);

    // Các hàm Alert dùng chung
    window.showAlert = (msg, title = "THÔNG BÁO") => {
        document.getElementById('alertMsg').innerText = msg;
        document.getElementById('alertTitle').innerText = title;
        document.getElementById('customAlert').style.display = 'flex';
    };
    window.closeAlert = () => document.getElementById('customAlert').style.display = 'none';
</script>
